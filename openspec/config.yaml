  - core/http_sse/ (SSE parser) is unused by any current resource
  - mypy run with --extras extract locally may surface errors CI doesn't catch
  - No shared integration CI job; adding one requires maintainer coordination
  - The two-host split (api.groundx.ai vs api.eyelevel.ai/upload) — upload host IS configurable via upload_api arg in ingest.py
  
  Sync/async duality rule: every change to GroundX must mirror in AsyncGroundX; every ingest path needs its async counterpart checked
  
  Commit convention: clear, descriptive, present tense; reference ticket ID in subject
  
  Agent boundaries — always/ask/never summary:
  - ALWAYS: run mypy + pytest before pushing; read credentials from os.environ; edit only .fernignore-listed paths
  - ASK FIRST: add optional dep to groundx[extract]; add path to .fernignore; modify .fern/metadata.json or ci.yml non-trivially; add CI job with shared credentials
  - NEVER: edit Fern-generated files directly; edit pyproject.toml for deps/mypy; remove path from .fernignore without re-homing hand-written code; commit credentials; create agent-tool-specific files duplicating AGENTS.md

rules:
  proposal:
    - State what the public package surface gains/changes and why; flag any breaking change
      to the published API (semver impact)
    - List downstream consumers (repos that import this package) affected
    - For a Fern-generated repo: confirm the change targets the hand-written layer only
      (paths on .fernignore). API-surface changes belong in the generation SOURCE repo, not here.
    - If open design questions remain after consulting AGENTS.md and existing specs, use the
      superpowers:brainstorming skill; otherwise note "none" in proposal.md
  specs:
    - Use the superpowers:test-driven-development skill to derive testable Given/When/Then
      scenarios; every requirement has at least one scenario
    - Specify the public function/class contract (inputs, outputs, raised errors, nullability)
    - Cover error paths and edge cases, not just the happy path
  design:
    - Only required for non-trivial additions; keep minimal otherwise
    - For a Fern repo, state explicitly which .fernignore paths the change lives under and
      confirm openspec/ remains on .fernignore (survives regeneration)
    - When a decision warrants an ADR, use the architectural-decision-records skill and write
      it to docs/adr/<LINEAR-TICKET>-<kebab>.md (Linear ticket prefix mandatory). Reference
      the ADR filename inline in design.md.
  tasks:
    - Implementation runs through the ambient Superpowers loop (brainstorm → plan → TDD →
      review → finish) — do not restate it; list only the artifact-specific work
    - Include tests for the hand-written layer (the part with no generated coverage)
    - Note any consumer that must bump its dependency pin on release
