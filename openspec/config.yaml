  Quality gates (CI, must pass before PR merge):
  - poetry run mypy . (without --extras extract — extract falls back to Any in CI)
  - poetry run pytest -rP -n auto . (asyncio_mode=auto)
  - Same suite re-run with --extras aiohttp installed
  - Ruff available but NOT a CI gate (run on changed files only)
